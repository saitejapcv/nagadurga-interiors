<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Quote Calculator | Kala & Co.</title>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg:      oklch(98% 0.004 95);
            --surface: oklch(100% 0.002 95);
            --fg:      oklch(20% 0.018 70);
            --muted:   oklch(48% 0.012 70);
            --border:  oklch(90% 0.006 95);
            --accent:  oklch(52% 0.10 28);

            --font-display: 'Iowan Old Style', 'Charter', Georgia, serif;
            --font-body:    -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --font-mono:    ui-monospace, 'IBM Plex Mono', Menlo, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-body);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-family: var(--font-display); font-size: 1.5rem; text-decoration: none; color: inherit; }

        .calculator-container {
            flex: 1;
            max-width: 800px;
            margin: 4rem auto;
            width: 100%;
            padding: 0 2rem;
        }

        .step-indicator {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }
        .step-dot {
            height: 4px;
            flex: 1;
            background: var(--border);
            transition: background 0.3s ease;
        }
        .step-dot.active { background: var(--fg); }

        h2 { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 1rem; font-weight: 400; }
        p.subtitle { color: var(--muted); margin-bottom: 3rem; }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .option-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .option-card:hover { border-color: var(--fg); }
        .option-card.selected { border-color: var(--fg); background: var(--fg); color: var(--bg); }

        .option-card .icon { font-size: 2rem; margin-bottom: 1rem; display: block; }
        .option-card .label { font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; }

        .actions {
            margin-top: 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 1rem 2rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            border: 1px solid var(--fg);
            cursor: pointer;
            transition: 0.2s ease;
            background: transparent;
        }
        .btn-primary { background: var(--fg); color: var(--bg); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .result-card {
            background: var(--fg);
            color: var(--bg);
            padding: 4rem;
            text-align: center;
            border: 1px solid var(--fg);
        }
        .result-price { font-family: var(--font-display); font-size: 4rem; margin: 2rem 0; }
        .result-disclaimer { font-size: 0.8rem; opacity: 0.7; margin-bottom: 2rem; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Kala & Co.</a>
        <div style="font-family: var(--font-mono); font-size: 0.7rem;">ESTIMATE TOOL V1.0</div>
    </nav>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const STEPS = [
            { id: 'bhk', title: 'Select BHK Type', subtitle: 'How many rooms are we designing?' },
            { id: 'city', title: 'Select Your City', subtitle: 'Location affects material and labor costs.' },
            { id: 'style', title: 'Preferred Style', subtitle: 'What defines your aesthetic?' },
            { id: 'result', title: 'Your Estimate', subtitle: 'A personalized calculation for your home.' }
        ];

        const OPTIONS = {
            bhk: [
                { id: '1bhk', label: '1 BHK', icon: '🏠', base: 350000 },
                { id: '2bhk', label: '2 BHK', icon: '🏠🏠', base: 550000 },
                { id: '3bhk', label: '3 BHK', icon: '🏢', base: 850000 },
                { id: 'villa', label: 'Villa', icon: '🏰', base: 1500000 }
            ],
            city: [
                { id: 'mumbai', label: 'Mumbai', multiplier: 1.2 },
                { id: 'bangalore', label: 'Bangalore', multiplier: 1.1 },
                { id: 'delhi', label: 'Delhi', multiplier: 1.05 },
                { id: 'pune', label: 'Pune', multiplier: 1.0 },
                { id: 'hyderabad', label: 'Hyderabad', multiplier: 1.0 }
            ],
            style: [
                { id: 'modern', label: 'Modern', multiplier: 1.0 },
                { id: 'traditional', label: 'Traditional', multiplier: 1.15 },
                { id: 'minimalist', label: 'Minimalist', multiplier: 0.9 },
                { id: 'luxury', label: 'Luxury', multiplier: 1.4 }
            ]
        };

        function Calculator() {
            const [step, setStep] = useState(0);
            const [selections, setSelections] = useState({ bhk: null, city: null, style: null });

            const handleSelect = (key, val) => {
                setSelections(prev => ({ ...prev, [key]: val }));
            };

            const next = () => setStep(s => s + 1);
            const back = () => setStep(s => s - 1);

            const calculateEstimate = () => {
                const bhk = OPTIONS.bhk.find(o => o.id === selections.bhk);
                const city = OPTIONS.city.find(o => o.id === selections.city);
                const style = OPTIONS.style.find(o => o.id === selections.style);
                
                if (!bhk || !city || !style) return 0;
                
                let total = bhk.base * city.multiplier * style.multiplier;
                return Math.round(total / 1000) * 1000;
            };

            const currentStepData = STEPS[step];
            const isLastStep = step === STEPS.length - 1;

            return (
                <div className="calculator-container">
                    <div className="step-indicator">
                        {STEPS.map((_, i) => (
                            <div key={i} className={`step-dot ${i <= step ? 'active' : ''}`} />
                        ))}
                    </div>

                    {!isLastStep ? (
                        <div>
                            <h2>{currentStepData.title}</h2>
                            <p className="subtitle">{currentStepData.subtitle}</p>

                            <div className="option-grid">
                                {OPTIONS[currentStepData.id].map(opt => (
                                    <div 
                                        key={opt.id} 
                                        className={`option-card ${selections[currentStepData.id] === opt.id ? 'selected' : ''}`}
                                        onClick={() => handleSelect(currentStepData.id, opt.id)}
                                    >
                                        {opt.icon && <span className="icon">{opt.icon}</span>}
                                        <span className="label">{opt.label}</span>
                                    </div>
                                ))}
                            </div>

                            <div className="actions">
                                <button className="btn" onClick={back} disabled={step === 0}>Back</button>
                                <button 
                                    className="btn btn-primary" 
                                    onClick={next} 
                                    disabled={!selections[currentStepData.id]}
                                >
                                    Continue
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="result-card">
                            <div className="mono" style={{ marginBottom: '1rem', opacity: 0.6 }}>Your Magic Estimate</div>
                            <h2>{selections.bhk.toUpperCase()} in {selections.city.toUpperCase()}</h2>
                            <div className="result-price">
                                ₹{calculateEstimate().toLocaleString('en-IN')}*
                            </div>
                            <p className="result-disclaimer">
                                *This is a ballpark figure based on standard materials. <br/>
                                Actual costs may vary by +/- 15% depending on specific finishes.
                            </p>
                            <a href="home.html" className="btn" style={{ background: 'white', color: 'black', border: 'none' }}>
                                Book Free Consultation
                            </a>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Calculator />);
    </script>
</body>
</html>
